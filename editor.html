<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level Editor - The Game</title>
    <style>
        body { 
            margin: 0; padding: 20px; 
            font-family: 'Courier New', Courier, monospace; 
            background: #222; color: #fff; 
            display: flex; flex-direction: row; gap: 20px; 
            height: 100vh; box-sizing: border-box;
        }
        #toolbar { 
            width: 300px; background: #333; 
            padding: 20px; border-radius: 8px; 
            overflow-y: auto;
        }
        #canvas-container { 
            flex-grow: 1; display: flex; 
            align-items: center; justify-content: center; 
            background: #111; border: 2px solid #555; 
            overflow: auto; border-radius: 8px;
        }
        canvas { 
            background: #000; cursor: crosshair; 
        }
        .tool-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; }
        button, input { 
            width: 100%; padding: 10px; margin-bottom: 10px; 
            background: #555; color: white; border: 1px solid #777; 
            cursor: pointer; box-sizing: border-box;
        }
        button:hover { background: #666; }
        .active-tool { background: #33ccff; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h2>Level Editor</h2>
        
        <div class="tool-group">
            <h3>Tools</h3>
            <button id="tool-draw" class="active-tool">Draw Block</button>
            <button id="tool-erase">Erase</button>
            <button id="tool-player">Place Player Start</button>
            <button id="tool-mover">Place Mover Enemy</button>
            <button id="tool-tank">Place Tank Enemy</button>
        </div>

        <div class="tool-group" id="block-settings">
            <h3>Block Settings</h3>
            <label>Color</label>
            <input type="color" id="block-color" value="#888888">
            <label>Height (1-5)</label>
            <input type="range" id="block-height" min="1" max="5" value="1">
            <span id="height-val">Height: 1</span>
        </div>

        <div class="tool-group">
            <button id="btn-save-play" style="background: #00cc66; font-size: 1.2em; font-weight: bold;">Save & Play</button>
            <button id="btn-clear" style="background: #cc0000;">Clear Map</button>
            <button id="btn-back" style="background: #444;">Back to Game</button>
        </div>
    </div>
    
    <div id="canvas-container">
        <canvas id="editor-canvas" width="800" height="800"></canvas>
    </div>

    <script src="editor.js"></script>
</body>
</html>
