<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Level Editor - The Game</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; }
        .panel { padding: 15px; background: #333; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        #left-panel { width: 250px; border-right: 1px solid #555; }
        #center-panel { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #111; overflow: auto; position: relative; }
        #right-panel { width: 300px; border-left: 1px solid #555; }
        
        canvas { background: #000; border: 1px solid #555; cursor: crosshair; }
        button, input[type="number"], input[type="color"], select, input[type="file"] { 
            padding: 8px; background: #555; color: white; border: 1px solid #777; width: 100%; box-sizing: border-box; margin-bottom: 5px; 
        }
        button:hover { background: #666; cursor: pointer; }
        .active-btn { background: #0088ff; font-weight: bold; }
        .section-title { margin-top: 15px; margin-bottom: 5px; border-bottom: 1px solid #555; padding-bottom: 5px; font-weight: bold; color: #aaa; }
        
        /* Outliner List */
        #outliner-list { flex-grow: 1; border: 1px solid #555; background: #2a2a2a; overflow-y: auto; min-height: 150px; margin-bottom: 15px;}
        .outliner-item { padding: 5px; border-bottom: 1px solid #444; cursor: pointer; font-family: monospace; font-size: 12px; }
        .outliner-item:hover { background: #444; }
        .outliner-item.selected { background: #0055aa; color: white; }
        
        label { font-size: 13px; display: block; margin-top: 5px; color: #ccc;}
        .prop-group { border: 1px solid #444; padding: 10px; background: #2a2a2a; margin-top: 5px;}
    </style>
</head>
<body>
    <div id="left-panel" class="panel">
        <h2 style="margin: 0;">Level Editor</h2>
        <div style="display: flex; gap: 5px;">
            <button id="btn-save" style="background: #0088ff; font-weight: bold; flex-grow: 1;">Save</button>
            <button id="btn-save-play" style="background: #00cc66; font-weight: bold; flex-grow: 1;">Save & Play</button>
        </div>
        <button id="btn-back">Back to Game</button>
        
        <div class="section-title">Tools</div>
        <button id="tool-select" class="tool-btn active-btn">Select Object</button>
        <button id="tool-block" class="tool-btn">Draw Block</button>
        <button id="tool-erase" class="tool-btn">Erase</button>
        
        <div class="section-title">Entities</div>
        <button id="tool-player" class="tool-btn">Place Player</button>
        <button id="tool-mover" class="tool-btn">Place Mover</button>
        <button id="tool-tank" class="tool-btn">Place Tank</button>
        
        <div class="section-title">Global</div>
        <button id="btn-clear" style="background: #cc0000;">Clear Map</button>
    </div>
    
    <div id="center-panel">
        <div style="position: absolute; top: 10px; left: 10px; color: #888; font-family: monospace;">
            Use Mouse Wheel to zoom.
        </div>
        <canvas id="editor-canvas" width="800" height="800"></canvas>
    </div>
    
    <div id="right-panel" class="panel">
        <div class="section-title">Outliner</div>
        <div id="outliner-list"></div>
        
        <div class="section-title">Properties</div>
        <div id="properties-panel" style="display: none;">
            <h3 id="prop-title" style="margin: 0; color: #00ffcc;">Object</h3>
            
            <div class="prop-group" id="prop-transform">
                <label>X: <input type="number" id="prop-x" step="0.5"></label>
                <label>Z: <input type="number" id="prop-z" step="0.5"></label>
                <label>Width: <input type="number" id="prop-w" step="0.5"></label>
                <label>Depth: <input type="number" id="prop-d" step="0.5"></label>
                <label>Height: <input type="number" id="prop-h" step="0.5"></label>
            </div>
            
            <div class="prop-group" id="prop-block" style="display:none;">
                <label>Color: <input type="color" id="prop-color"></label>
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="prop-breakable" style="width: auto;"> Breakable
                </label>
                <label id="lbl-hp">HP: <input type="number" id="prop-hp"></label>
                <label>Texture (PNG/JPG):<input type="file" id="prop-texture-file" accept="image/png, image/jpeg"></label>
                <button id="btn-clear-texture" style="font-size: 10px;">Clear Texture</button>
            </div>
            
            <div class="prop-group" id="prop-enemy" style="display:none;">
                <label>HP: <input type="number" id="prop-enemy-hp"></label>
                <label>Damage: <input type="number" id="prop-enemy-dmg"></label>
                <label>Speed: <input type="number" id="prop-enemy-speed" step="0.5"></label>
                <label>Custom Model (.glb):<input type="file" id="prop-model-file" accept=".glb"></label>
                <button id="btn-clear-model" style="font-size: 10px;">Clear Model</button>
            </div>
            
            <div class="prop-group" id="prop-player" style="display:none;">
                <label>Max HP: <input type="number" id="prop-player-hp"></label>
                <label>Move Speed: <input type="number" id="prop-player-speed" step="0.5"></label>
                <label>Jump Velocity: <input type="number" id="prop-player-jump" step="0.5"></label>
                <div style="margin-top: 10px; font-weight: bold; color: #aaa;">Starting Weapons:</div>
                <label><input type="checkbox" id="prop-wpn-pistol" class="prop-wpn" value="Pistol"> Pistol</label>
                <label><input type="checkbox" id="prop-wpn-shotgun" class="prop-wpn" value="Shotgun"> Shotgun</label>
                <label><input type="checkbox" id="prop-wpn-ar" class="prop-wpn" value="Assault Rifle"> Assault Rifle</label>
                <label><input type="checkbox" id="prop-wpn-mg" class="prop-wpn" value="Machine Gun"> Machine Gun</label>
                <label><input type="checkbox" id="prop-wpn-rocket" class="prop-wpn" value="Rocket Launcher"> Rocket Launcher</label>
                
                <div style="margin-top: 10px; font-weight: bold; color: #aaa;">Starting Powers:</div>
                <label><input type="checkbox" id="prop-pwr-rewind" class="prop-pwr" value="rewind"> Rewind</label>
                <label><input type="checkbox" id="prop-pwr-time" class="prop-pwr" value="timeDilation"> Time Dilation</label>
                <label><input type="checkbox" id="prop-pwr-health" class="prop-pwr" value="healthUp"> Health Reflect</label>
                <label><input type="checkbox" id="prop-pwr-dd" class="prop-pwr" value="doubleDamage"> Double Damage</label>
            </div>
            
            <button id="btn-delete-obj" style="background: #cc0000; margin-top: 15px;">Delete Object</button>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
